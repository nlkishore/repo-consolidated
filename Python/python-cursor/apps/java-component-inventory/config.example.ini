# Copy to config.ini and adjust. Lines starting with # are comments.

[paths]
# Root directory that contains your component folders (and possibly other dirs we will NOT scan).
base_folder = C:\path\to\product-root

[scan]
# Only these folder names (direct children of base_folder) are scanned for *.java
# Comma-separated. Whitespace around names is trimmed.
components = component-core, component-banking, custom-client-acme

[output]
# Directory for generated Excel reports (created if missing). Empty = base_folder/java-inventory-reports
report_dir =

[options]
# Include a second sheet listing duplicate FQNs (same package + class) across components
detect_collisions = true
