###############################################################################
# Turbine Resources Configuration
###############################################################################

# -------------------------------------------------------------------
# General Settings
# -------------------------------------------------------------------
turbine.default.layout = DefaultLayout
turbine.default.screen = DefaultScreen
turbine.default.error.screen = ErrorScreen
turbine.default.message = Welcome to Turbine!
turbine.default.locale = en_US
turbine.default.charset = UTF-8

# -------------------------------------------------------------------
# Module Packages
# -------------------------------------------------------------------
module.packages = com.example.screens

# -------------------------------------------------------------------
# Services Configuration
# -------------------------------------------------------------------

# Logging Service
services.LoggingService.classname = org.apache.turbine.services.logging.Log4J2Service

# Localization Service
services.LocalizationService.classname = org.apache.turbine.services.localization.LocalizationService

# Scheduler Service
services.SchedulerService.classname = org.apache.fulcrum.quartz.QuartzSchedulerService

# Security Service (Fulcrum Security)
services.SecurityService.classname = org.apache.turbine.services.security.TurbineSecurityService

# User Manager
services.SecurityService.user.manager = org.apache.fulcrum.security.torque.TorqueUserManager

# Role Manager
services.SecurityService.role.manager = org.apache.fulcrum.security.torque.TorqueRoleManager

# Group Manager
services.SecurityService.group.manager = org.apache.fulcrum.security.torque.TorqueGroupManager

# Permission Manager
services.SecurityService.permission.manager = org.apache.fulcrum.security.torque.TorquePermissionManager

# Access Controller
services.SecurityService.access.controller = org.apache.fulcrum.security.torque.TorqueAccessController

# Model Manager
services.SecurityService.model.manager = org.apache.fulcrum.security.model.turbine.TurbineModelManager

# -------------------------------------------------------------------
# Torque Configuration
# -------------------------------------------------------------------
services.TorqueService.classname = org.apache.turbine.services.torque.TorqueService

# -------------------------------------------------------------------
# Template Engine
# -------------------------------------------------------------------
services.TemplateService.classname = org.apache.turbine.services.template.VelocityService
services.TemplateService.template.path = templates
services.TemplateService.template.extension = vm

# -------------------------------------------------------------------
# Intake Service (optional for form validation)
services.IntakeService.classname = org.apache.fulcrum.intake.IntakeService

# -------------------------------------------------------------------
# Pool Service (optional)
services.PoolService.classname = org.apache.fulcrum.pool.DefaultPoolService

# -------------------------------------------------------------------
# Upload Service (optional)
services.UploadService.classname = org.apache.fulcrum.upload.DefaultUploadService

# -------------------------------------------------------------------
# Crypto Service (optional for password hashing)
services.CryptoService.classname = org.apache.fulcrum.crypto.DefaultCryptoService

# -------------------------------------------------------------------
# Default User Implementation
services.SecurityService.wrapper.class = org.apache.fulcrum.security.torque.om.TorqueAbstractUser

# -------------------------------------------------------------------
# Scheduler Settings
services.SchedulerService.configFile = quartz.properties