# Torque 7 runtime (adjust for your environment; use env-specific files outside VCS in production).
torque.database.default=uob_portal
torque.database.uob_portal.adapter=mysql

torque.dsfactory.uob_portal.factory=org.apache.torque.dsfactory.SharedPool2DataSourceFactory
torque.dsfactory.uob_portal.connection.driver=com.mysql.cj.jdbc.Driver
torque.dsfactory.uob_portal.connection.url=jdbc:mysql://localhost:3306/uob_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
torque.dsfactory.uob_portal.connection.user=root
torque.dsfactory.uob_portal.connection.password=password
