torque.dsfactory.helloworld.factory=org.apache.torque.dsfactory.JndiDataSourceFactory
torque.dsfactory.helloworld.jndi.path=java:comp/env/jdbc/turbine
torque.dsfactory.helloworld.jndi.ttl=300000

