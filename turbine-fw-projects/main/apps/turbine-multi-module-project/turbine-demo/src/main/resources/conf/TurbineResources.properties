

# Default template to render if none is specified
services.TemplateService.default.template = hello.vm

# Default module/package
module.packages=com.uob.turbine

# Template location
template.path=templates


# -------------------------------------------------------------------
# Default module packages
# -------------------------------------------------------------------
module.packages = org.apache.turbine.modules

# -------------------------------------------------------------------
# Velocity Service - Template & Layout Setup
# -------------------------------------------------------------------

# Directory for screen templates
services.VelocityService.screen.template = templates/screens

# Directory for layout templates
services.VelocityService.layout.template = templates/layouts

# Default layout to use (Velocity file under layout.template dir)
services.VelocityService.default.layout.template = Default.vm

# Optional: Page and content templates (not strictly needed at start)
services.VelocityService.page.template = templates/pages
services.VelocityService.content.template = templates/content

# Template extension
services.VelocityService.template.extension = vm

# Enable caching (set false while developing)
services.VelocityService.template.cache = false
# Logging
# Change the logging level to DEBUG for verbose output
logging.rootLogger=DEBUG, console
logging.appender.console=org.apache.turbine.util.LogConsoleAppender
logging.appender.console.layout=org.apache.turbine.util.LogPatternLayout
logging.appender.console.layout.pattern=%d [%t] %-5p %c - %m%n
# -------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------
services.LoggingService.log4j.category = org.apache.turbine

# Turbine Core
services.ResourceService.xml=conf/services.xml
services.SecurityService.xml=conf/security.xml
services.SchedulerService.xml=conf/scheduler.xml